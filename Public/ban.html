<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathNote - Ban Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef2ff;
            overflow-x: hidden;
        }
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }
        .hamburger {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 1100;
            background: #0f172a;
            border: 2px solid #8B0000;
            font-size: 1.5rem;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #8B0000;
        }
        .hamburger:hover {
            background: #8B0000;
            color: white;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(3, 5, 11, 0.95);
            backdrop-filter: blur(16px);
            border-right: 2px solid #8B0000;
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5f5;
            text-decoration: none;
            border-radius: 0.75rem;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .sidebar a i {
            width: 24px;
            color: #8B0000;
        }
        .sidebar a:hover {
            background: rgba(139, 0, 0, 0.15);
            color: #8B0000;
            border-color: #8B0000;
            transform: translateX(5px);
        }
        .content {
            padding: 80px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(139, 0, 0, 0.3);
            transition: 0.2s;
        }
        .glass-card:hover {
            border-color: #8B0000;
            transform: translateY(-4px);
        }
        .logo-img {
            width: 160px;
            display: block;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 0 8px #8B0000);
        }
        h2, h3 {
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .category-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .category-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .category-btn.active {
            background: #8B0000;
            color: white;
            box-shadow: 0 0 10px rgba(139,0,0,0.5);
        }
        .category-btn:hover:not(.active) {
            background: rgba(139,0,0,0.3);
            color: #ffaaaa;
        }
        .user-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            border: 1px solid #8B0000;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: #8B0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.5rem;
            outline: none;
        }
        .user-input::placeholder {
            color: #6b7280;
        }
        .intensity-slider {
            margin: 1rem 0;
        }
        .intensity-slider label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        input[type="range"] {
            width: 100%;
            background: #334155;
            height: 4px;
            border-radius: 5px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #8B0000;
            cursor: pointer;
        }
        .bug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .bug-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8B0000;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .bug-card:hover, .bug-card.selected {
            background: #8B0000;
            transform: scale(1.02);
            border-color: white;
        }
        .bug-card i {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        .bug-card span {
            font-weight: 600;
        }
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            border: 1px solid #8B0000;
        }
        .recent-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .recent-item {
            padding: 0.4rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
        }
        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #8B0000;
            color: #8B0000;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover {
            background: #8B0000;
            color: white;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.5);
            font-family: monospace;
        }
        .quote {
            text-align: center;
            font-style: italic;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6b7280;
        }
        .multi-target-badge {
            background: #8B0000;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="https://d.uguu.se/SdnvhOjq.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0 1rem 1rem; border-bottom: 2px solid #8B0000; margin-bottom: 1rem;">
            <i class="fas fa-skull" style="font-size: 1.8rem; color:#8B0000;"></i>
            <span style="font-weight: 800; font-size: 1.3rem;">DeathNote</span>
        </div>
        <a href="main.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="connect.html"><i class="fas fa-plug"></i> Connect WhatsApp</a>
        <a href="ban.html"><i class="fas fa-gavel"></i> Ban Panel</a>
        <a href="unban.html"><i class="fas fa-unlock-alt"></i> Unban Panel</a>
        <a href="media.html"><i class="fas fa-download"></i> Media Downloader</a>
        <a href="dev.html"><i class="fas fa-code"></i> Developer</a>
        <a href="anime.html"><i class="fas fa-dragon"></i> Anime</a>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="content">
        <div class="glass-card">
            <img class="logo-img" src="https://d.uguu.se/pavwQeEi.jpg" alt="DeathNote Logo">
            <h2><i class="fas fa-skull"></i> Death Ban Panel</h2>
            <div class="quote" id="randomQuote">Loading...</div>

            <!-- Category Tabs -->
            <div class="category-tabs">
                <button class="category-btn" data-cat="group">👥 GROUP</button>
                <button class="category-btn active" data-cat="android">📱 ANDROID</button>
                <button class="category-btn" data-cat="ios">🍎 iOS</button>
            </div>

            <!-- Victim Box with preview -->
            <div class="user-box" id="userBox">
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user-secret"></i>
                </div>
                <input type="tel" id="targetNumber" class="user-input" placeholder="Enter victim number(s) - comma or space separated">
            </div>

            <!-- Intensity Slider -->
            <div class="intensity-slider">
                <label>💀 Ban Intensity: <span id="intensityValue">50</span>%</label>
                <input type="range" id="intensitySlider" min="0" max="100" value="50">
            </div>

            <!-- Stats & Recent Bans -->
            <div class="stats-row">
                <div class="stat-badge"><i class="fas fa-chart-line"></i> Total Bans: <span id="totalBans">0</span></div>
                <div class="stat-badge"><i class="fas fa-clock"></i> Last Ban: <span id="lastBanTime">—</span></div>
                <div class="stat-badge"><i class="fas fa-bullseye"></i> Multi-target: <span id="multiTargetCount">0</span></div>
            </div>

            <!-- Bug Grid -->
            <div id="bugListContainer">
                <div class="bug-grid" id="bugGrid"></div>
            </div>

            <button id="executeBtn">💀 EXECUTE 💀</button>
            <div id="resultStatus" class="status" style="display:none;"></div>

            <!-- Recent Bans Log -->
            <h3><i class="fas fa-history"></i> Recent Bans</h3>
            <div id="recentBans" class="recent-list">— No bans executed —</div>
        </div>
        <div class="footer">⚠️ Misuse of this panel may lead to consequences. Use at your own risk.</div>
    </div>

    <script>
        // Bug categories
        const bugCategories = {
            group: {
                name: "Group Bans",
                commands: [
                    { name: "kick", icon: "fa-user-slash" },
                    { name: "promote", icon: "fa-arrow-up" },
                    { name: "demote", icon: "fa-arrow-down" },
                    { name: "mute", icon: "fa-volume-mute" },
                    { name: "unmute", icon: "fa-volume-up" },
                    { name: "tagall", icon: "fa-tag" },
                    { name: "warn", icon: "fa-exclamation-triangle" }
                ]
            },
            android: {
                name: "Android Bans",
                commands: [
                    { name: "brutalforceclose", icon: "fa-bomb" },
                    { name: "blankfreeze", icon: "fa-snowflake" },
                    { name: "suprisedummy", icon: "fa-question" },
                    { name: "bugandroid", icon: "fa-bug" },
                    { name: "crashandroid", icon: "fa-crash" },
                    { name: "killandroid", icon: "fa-skull" },
                    { name: "lagandroid", icon: "fa-tachometer-alt" },
                    { name: "freezeandroid", icon: "fa-icicles" },
                    { name: "voidandroid", icon: "fa-ghost" }
                ]
            },
            ios: {
                name: "iOS Bans",
                commands: [
                    { name: "ios_crash", icon: "fa-apple" },
                    { name: "ios_freeze", icon: "fa-thermometer-empty" },
                    { name: "ios_bootloop", icon: "fa-sync-alt" },
                    { name: "ios_respring", icon: "fa-redo-alt" },
                    { name: "ios_springboard", icon: "fa-mobile-alt" },
                    { name: "ios_kernelpanic", icon: "fa-microchip" }
                ]
            }
        };

        const quotes = [
            "The weak deserves elimination.",
            "Only the number is required.",
            "Your name is already written.",
            "I am justice.",
            "This world is rotten.",
            "Eliminate with no mercy.",
            "The note never forgets.",
            "I'll take a potato chip... and eat it!"
        ];

        let currentCategory = "android";
        let selectedBug = null;
        let totalBans = 0;
        let recentBans = [];

        // Load saved stats from localStorage (optional)
        function loadStats() {
            const saved = localStorage.getItem('deathnote_ban_stats');
            if (saved) {
                const data = JSON.parse(saved);
                totalBans = data.totalBans || 0;
                recentBans = data.recentBans || [];
                updateStatsUI();
            }
        }
        function saveStats() {
            localStorage.setItem('deathnote_ban_stats', JSON.stringify({ totalBans, recentBans }));
        }
        function addBanRecord(target, bug, intensity, success) {
            totalBans++;
            recentBans.unshift({
                time: new Date().toLocaleString(),
                target,
                bug,
                intensity,
                success
            });
            if (recentBans.length > 10) recentBans.pop();
            updateStatsUI();
            saveStats();
        }
        function updateStatsUI() {
            document.getElementById('totalBans').innerText = totalBans;
            document.getElementById('lastBanTime').innerText = recentBans.length ? recentBans[0].time : '—';
            const container = document.getElementById('recentBans');
            if (recentBans.length === 0) {
                container.innerHTML = '— No bans executed —';
            } else {
                container.innerHTML = recentBans.map(b => `<div class="recent-item"><span>${b.time}</span><span>${b.target} → ${b.bug} (${b.intensity}%)</span><span>${b.success ? '✅' : '❌'}</span></div>`).join('');
            }
        }

        // Victim preview (mock - you can connect to real API)
        async function fetchVictimInfo(number) {
            // In a real app, call /api/user-info?number=...
            // For demo, we'll show a default avatar and name from number
            const firstNumber = number.split(/[ ,]+/)[0];
            if (firstNumber) {
                // Simulate preview (you can replace with actual fetch)
                const avatarElem = document.getElementById('userAvatar');
                avatarElem.innerHTML = `<img src="https://randomuser.me/api/portraits/lego/${Math.floor(Math.random()*10)}.jpg" onerror="this.src=''">`;
                // Optionally, you could show a name tooltip
            }
        }

        // Multi-target parsing
        function parseTargets(input) {
            // split by comma or space
            let parts = input.split(/[ ,]+/);
            return parts.filter(p => p.trim().length > 5); // simple validation
        }

        // Intensity slider
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');
        intensitySlider.addEventListener('input', () => {
            intensityValue.innerText = intensitySlider.value;
        });

        // UI Helpers
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'index.html';
        }
        function setRandomQuote() {
            const idx = Math.floor(Math.random() * quotes.length);
            document.getElementById('randomQuote').innerText = `"${quotes[idx]}"`;
        }
        function renderBugGrid() {
            const container = document.getElementById('bugGrid');
            const categoryData = bugCategories[currentCategory];
            if (!categoryData) return;
            container.innerHTML = '';
            categoryData.commands.forEach(cmd => {
                const card = document.createElement('div');
                card.className = 'bug-card';
                card.setAttribute('data-bug', cmd.name);
                card.innerHTML = `<i class="fas ${cmd.icon}"></i><span>${cmd.name}</span>`;
                card.onclick = () => {
                    document.querySelectorAll('.bug-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedBug = cmd.name;
                };
                container.appendChild(card);
            });
        }
        function setActiveCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.getAttribute('data-cat') === cat) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            selectedBug = null;
            renderBugGrid();
        }

        // Event listeners
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.getAttribute('data-cat');
                setActiveCategory(cat);
            });
        });

        // Preview when user types
        const targetInput = document.getElementById('targetNumber');
        let previewTimeout;
        targetInput.addEventListener('input', () => {
            clearTimeout(previewTimeout);
            previewTimeout = setTimeout(() => {
                const val = targetInput.value.trim();
                if (val) {
                    fetchVictimInfo(val);
                    const targets = parseTargets(val);
                    document.getElementById('multiTargetCount').innerText = targets.length;
                } else {
                    document.getElementById('userAvatar').innerHTML = '<i class="fas fa-user-secret"></i>';
                    document.getElementById('multiTargetCount').innerText = '0';
                }
            }, 500);
        });

        // Execute ban
        document.getElementById('executeBtn').onclick = async () => {
            const rawTarget = targetInput.value.trim();
            if (!rawTarget) {
                alert('Please enter at least one victim number.');
                return;
            }
            if (!selectedBug) {
                alert('Please select a ban type.');
                return;
            }
            const targets = parseTargets(rawTarget);
            const intensity = intensitySlider.value;
            // Confirm if intensity > 80
            if (intensity > 80 && !confirm(`⚠️ High intensity (${intensity}%) may cause irreversible damage. Continue?`)) {
                return;
            }
            const statusDiv = document.getElementById('resultStatus');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Executing bans...';
            let successCount = 0;
            for (let target of targets) {
                try {
                    const res = await fetch('/api/execute-bug', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ bugType: selectedBug, targetNumber: target, category: currentCategory, intensity })
                    });
                    const data = await res.json();
                    if (data.success) {
                        successCount++;
                        addBanRecord(target, selectedBug, intensity, true);
                    } else {
                        addBanRecord(target, selectedBug, intensity, false);
                    }
                } catch (err) {
                    addBanRecord(target, selectedBug, intensity, false);
                }
            }
            statusDiv.innerHTML = `✅ ${successCount}/${targets.length} bans executed successfully.<br>📓 Last target: ${targets[targets.length-1]}<br>⚡ Bug: ${selectedBug} (${intensity}%)`;
            // Clear selection after execution? optional
        };

        // Initial load
        renderBugGrid();
        setRandomQuote();
        setInterval(setRandomQuote, 15000);
        loadStats();
    </script>
</body>
</html>
