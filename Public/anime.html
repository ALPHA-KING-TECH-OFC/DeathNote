<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathNote - Anime Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef2ff;
            overflow-x: hidden;
        }
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }
        .hamburger {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 1100;
            background: #0f172a;
            border: 2px solid #8B0000;
            font-size: 1.5rem;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #8B0000;
        }
        .hamburger:hover {
            background: #8B0000;
            color: white;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(3, 5, 11, 0.95);
            backdrop-filter: blur(16px);
            border-right: 2px solid #8B0000;
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5f5;
            text-decoration: none;
            border-radius: 0.75rem;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .sidebar a i {
            width: 24px;
            color: #8B0000;
        }
        .sidebar a:hover {
            background: rgba(139, 0, 0, 0.15);
            color: #8B0000;
            border-color: #8B0000;
            transform: translateX(5px);
        }
        .content {
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(139, 0, 0, 0.3);
            transition: 0.2s;
            text-align: center;
        }
        .glass-card:hover {
            border-color: #8B0000;
            transform: translateY(-4px);
        }
        .logo-img {
            width: 160px;
            display: block;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 0 8px #8B0000);
        }
        h2 {
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .anime-image {
            margin: 1rem auto;
            max-width: 100%;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(139,0,0,0.3);
            transition: 0.3s;
        }
        .anime-image:hover {
            transform: scale(1.02);
        }
        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #8B0000;
            color: #8B0000;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            margin: 1rem 0;
        }
        button:hover {
            background: #8B0000;
            color: white;
        }
        .quote {
            font-style: italic;
            color: #94a3b8;
            margin: 1rem 0;
            font-size: 1rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6b7280;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #8B0000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="https://d.uguu.se/SdnvhOjq.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0 1rem 1rem; border-bottom: 2px solid #8B0000; margin-bottom: 1rem;">
            <i class="fas fa-skull" style="font-size: 1.8rem; color:#8B0000;"></i>
            <span style="font-weight: 800; font-size: 1.3rem;">DeathNote</span>
        </div>
        <a href="main.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="connect.html"><i class="fas fa-plug"></i> Connect WhatsApp</a>
        <a href="ban.html"><i class="fas fa-gavel"></i> Ban Panel</a>
        <a href="unban.html"><i class="fas fa-unlock-alt"></i> Unban Panel</a>
        <a href="media.html"><i class="fas fa-download"></i> Media Downloader</a>
        <a href="dev.html"><i class="fas fa-code"></i> Developer</a>
        <a href="anime.html"><i class="fas fa-dragon"></i> Anime</a>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="content">
        <div class="glass-card">
            <img class="logo-img" src="https://d.uguu.se/pavwQeEi.jpg" alt="DeathNote Logo">
            <h2><i class="fas fa-dragon"></i> Anime Gallery</h2>
            <div class="quote" id="animeQuote">"I'll take a potato chip... and eat it!"</div>
            <div id="imageContainer">
                <img id="animeImg" class="anime-image" src="https://cdn.waifu.pics/sfw/waifu.png" alt="Anime Image" style="max-width:100%; max-height:400px;">
            </div>
            <button id="nextBtn">🔄 Next Image</button>
            <div id="loadingMsg" style="display:none;">Loading<span class="loading"></span></div>
        </div>
        <div class="footer">Powered by Waifu.pics | DeathNote Webug</div>
    </div>

    <script>
        const quotes = [
            "I am justice.",
            "The note never forgets.",
            "Only the number is required.",
            "Eliminate with no mercy.",
            "Your name is already written.",
            "This world is rotten.",
            "I'll take a potato chip... and eat it!",
            "Delete, delete, delete..."
        ];

        function getRandomQuote() {
            return quotes[Math.floor(Math.random() * quotes.length)];
        }

        async function fetchRandomAnime() {
            const imgElem = document.getElementById('animeImg');
            const quoteElem = document.getElementById('animeQuote');
            const loading = document.getElementById('loadingMsg');
            loading.style.display = 'block';
            try {
                // Use waifu.pics API for random anime image (sfw)
                const response = await fetch('https://api.waifu.pics/sfw/waifu');
                const data = await response.json();
                imgElem.src = data.url;
                imgElem.alt = 'Random Anime';
                quoteElem.innerText = `"${getRandomQuote()}"`;
            } catch (err) {
                console.error('Anime fetch error:', err);
                // Fallback image
                imgElem.src = 'https://cdn.waifu.pics/sfw/waifu.png';
                quoteElem.innerText = '"The note never forgets..."';
            } finally {
                loading.style.display = 'none';
            }
        }

        document.getElementById('nextBtn').onclick = fetchRandomAnime;
        fetchRandomAnime();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
