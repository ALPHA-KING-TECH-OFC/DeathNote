<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathNote - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: -1;
        }
        .card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 450px;
            max-width: 95%;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .card:hover {
            border-color: #8B0000;
            transform: translateY(-4px);
        }
        .logo-img {
            width: 150px;
            display: block;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 0 6px #8B0000);
        }
        input, select {
            width: 100%;
            padding: 0.7rem 1rem;
            margin: 0.5rem 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            color: white;
            font-family: 'Inter', monospace;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #8B0000;
        }
        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #8B0000;
            color: #8B0000;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
            transition: 0.2s;
        }
        button:hover {
            background: #8B0000;
            color: white;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #facc15;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
        }
        .back-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="https://d.uguu.se/SdnvhOjq.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="card">
        <img class="logo-img" src="https://d.uguu.se/pavwQeEi.jpg" alt="DeathNote Logo">
        <input type="email" id="email" placeholder="EMAIL">
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <input type="number" id="age" placeholder="AGE">
        <select id="gender">
            <option value="Male">♂ MALE</option>
            <option value="Female">♀ FEMALE</option>
            <option value="Other">⚬ OTHER</option>
        </select>
        <input type="text" id="country" placeholder="COUNTRY">
        <input type="tel" id="number" placeholder="PHONE NUMBER">
        <button onclick="register()">🔮 VERIFY & REQUEST APPROVAL 🔮</button>
        <div id="msg" class="message"></div>
        <div class="back-link">← <a href="index.html">Back to the void</a></div>
    </div>
    <script>
        async function register() {
            const data = {
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                country: document.getElementById('country').value,
                number: document.getElementById('number').value
            };
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            document.getElementById('msg').innerText = result.message;
            if (result.success) setTimeout(() => window.location.href = 'index.html', 3000);
        }
    </script>
</body>
</html>
